name: Deploy to Development

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write
  pull-requests: write

env:
  AWS_REGION: eu-west-2
  PYTHON_VERSION: 3
  TERRAFORM_VERSION: 1.13.4
  TERRAGRUNT_VERSION: 0.78.1
  # TODO: Remove this when autero1/action-terragrunt@v3 is updated to use node 24
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint:
    runs-on: ubuntu-latest
    env:
      TF_PLUGIN_CACHE_DIR: "/home/runner/.terraform.d/plugin-cache"
      TG_PROVIDER_CACHE_DIR: "/home/runner/.terraform.d/plugin-cache"
      TG_PROVIDER_CACHE: 1
    steps:
      - run: mkdir -p "$TF_PLUGIN_CACHE_DIR"
      - uses: actions/checkout@v5

      - uses: actions/cache@v5
        with:
          path: ~/.cache/pre-commit
          key: ${{ runner.os }}-pre-commit-${{ hashFiles('.pre-commit-config.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pre-commit-

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - uses: trade-tariff/trade-tariff-tools/.github/actions/setup-tflint@main

      - uses: trade-tariff/trade-tariff-tools/.github/actions/setup-ssh@main
        with:
          ssh-key: ${{ secrets.PRIVATE_SSH_KEY }}

      - uses: autero1/action-terragrunt@v3
        with:
          terragrunt-version: ${{ env.TERRAGRUNT_VERSION }}

      - uses: hashicorp/setup-terraform@v4
        with:
            terraform_version: ${{ env.TERRAFORM_VERSION }}

      - run: terragrunt init --all
        env:
          DISABLE_INIT: true

      - name: Init Terraform modules
        run: |
          for module in modules/*; do
            if [ -d "$module" ]; then
              terraform -chdir="$module" init
            fi
          done

      - name: Warm provider cache
        run: terraform init -backend=false
        working-directory: environments/development/common

      - run: pip install pre-commit

      - run: pre-commit run --all-files --show-diff-on-failure

  plan-development:
    environment: development

    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::844815912454:role/GithubActions-Terraform-Role
          aws-region: ${{ env.AWS_REGION }}

      - uses: trade-tariff/trade-tariff-tools/.github/actions/setup-ssh@main
        with:
          ssh-key: ${{ secrets.PRIVATE_SSH_KEY }}

      - uses: autero1/action-terragrunt@v3
        with:
          terragrunt-version: ${{ env.TERRAGRUNT_VERSION }}

      - uses: hashicorp/setup-terraform@v4
        with:
            terraform_version: ${{ env.TERRAFORM_VERSION }}

      - run: terragrunt init --all
        working-directory: environments/development

      - run: terragrunt plan --all --out=terragrunt.tfplan
        working-directory: environments/development

      - name: Export Plan as JSON
        run: |
          terragrunt show --all -json terragrunt.tfplan \
            | jq -s '.' > tfplan.json
        working-directory: environments/development

      - name: Post Terraform Plan Comment (JSON-based)
        if: github.event_name == 'pull_request'
        env:
          TF_ENV: development
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          chmod +x .github/bin/comment-tfplan
          .github/bin/comment-tfplan environments/development/tfplan.json

  apply-development:
    needs: plan-development
    environment: development
    env:
      TERRAGRUNT_NON_INTERACTIVE: true
      TF_INPUT: false
      TF_IN_AUTOMATION: 1

    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::844815912454:role/GithubActions-Terraform-Role
          aws-region: ${{ env.AWS_REGION }}

      - uses: trade-tariff/trade-tariff-tools/.github/actions/setup-ssh@main
        with:
          ssh-key: ${{ secrets.PRIVATE_SSH_KEY }}

      - uses: ruby/setup-ruby@v1

      - run: bundle config set path 'vendor/bundle' && bundle install
        working-directory: common/lambda/trade-tariff-identity-create-auth-challenge

      - uses: autero1/action-terragrunt@v3
        with:
          terragrunt-version: ${{ env.TERRAGRUNT_VERSION }}

      - uses: hashicorp/setup-terraform@v4
        with:
            terraform_version: ${{ env.TERRAFORM_VERSION }}

      - run: terragrunt init --all
        working-directory: environments/development

      - run: terragrunt apply --all
        name: apply-all-base
        working-directory: environments/development/base

      - run: terragrunt apply --all
        name: apply-all-applications
        working-directory: environments/development/applications

      - run: terragrunt apply --all
        name: apply-all-common
        working-directory: environments/development/common

  notifications:
      runs-on: ubuntu-latest
      needs: apply-development
      if: always()
      steps:
        - uses: actions/checkout@v5
        - uses: trade-tariff/trade-tariff-tools/.github/actions/slack-notify@main
          with:
            webhook: ${{ secrets.SLACK_WEBHOOK }}
            color: ${{ needs.apply-development.result }}
            title: "Development Deploy"
            message: "Deploy to development ${{ needs.apply-development.result }}"
        - run: if [[ "${{ needs.apply-development.result }}" != "success" ]]; then exit 1; fi

  plan-staging:
    environment: staging

    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::451934005581:role/GithubActions-Terraform-Role
          aws-region: ${{ env.AWS_REGION }}

      - uses: trade-tariff/trade-tariff-tools/.github/actions/setup-ssh@main
        with:
          ssh-key: ${{ secrets.PRIVATE_SSH_KEY }}

      - uses: autero1/action-terragrunt@v3
        with:
          terragrunt-version: ${{ env.TERRAGRUNT_VERSION }}

      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - run: terragrunt init --all
        working-directory: environments/staging

      - run: terragrunt plan --all -out=terragrunt.tfplan
        working-directory: environments/staging

      - name: Export Plan as JSON
        run: |
          terragrunt show --all -json terragrunt.tfplan \
            | jq -s '.' > tfplan.json
        working-directory: environments/staging

      - name: Post Terraform Plan Comment (JSON-based)
        if: github.event_name == 'pull_request'
        env:
          TF_ENV: staging
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          chmod +x .github/bin/comment-tfplan
          .github/bin/comment-tfplan environments/staging/tfplan.json

  plan-production:
    environment: production
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::382373577178:role/GithubActions-Terraform-Role
          aws-region: ${{ env.AWS_REGION }}

      - uses: trade-tariff/trade-tariff-tools/.github/actions/setup-ssh@main
        with:
          ssh-key: ${{ secrets.PRIVATE_SSH_KEY }}

      - uses: autero1/action-terragrunt@v3
        with:
          terragrunt-version: ${{ env.TERRAGRUNT_VERSION }}

      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - run: terragrunt init --all
        working-directory: environments/production

      - run: terragrunt plan --all -out=terragrunt.tfplan
        working-directory: environments/production

      - name: Export Plan as JSON
        run: |
          terragrunt show --all -json terragrunt.tfplan \
            | jq -s '.' > tfplan.json
        working-directory: environments/production

      - name: Post Terraform Plan Comment (JSON-based)
        if: github.event_name == 'pull_request'
        env:
          TF_ENV: production
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          chmod +x .github/bin/comment-tfplan
          .github/bin/comment-tfplan environments/production/tfplan.json
