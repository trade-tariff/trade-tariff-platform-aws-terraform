---
repos:
  - repo: https://github.com/gruntwork-io/pre-commit
    rev: v0.1.30
    hooks:
      - id: terragrunt-hcl-fmt

  - repo: https://github.com/antonbabenko/pre-commit-terraform
    rev: v1.105.0
    hooks:
      - id: terraform_fmt
      # -backend=false: install modules/providers without remote state (S3 backend often
      # unavailable locally); otherwise init aborts and validate reports "Module not installed".
      - id: terraform_validate
        args:
          - --hook-config=--parallelism-limit=1
          - --tf-init-args=-lockfile=readonly
          - --tf-init-args=-backend=false
      - id: terraform_tflint
        args:
          - --hook-config=--parallelism-limit=1
          - --tf-init-args=-lockfile=readonly
          - --tf-init-args=-backend=false

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-merge-conflict

  - repo: https://github.com/rhysd/actionlint.git
    rev: v1.7.11
    hooks:
      - id: actionlint-docker

  - repo: local
    hooks:
      - id: trufflehog
        name: TruffleHog
        description: Detect secrets in your repo
        entry: bash -c '.github/bin/trufflehog'
        language: system
        stages: ["pre-commit", "pre-push"]
